name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init vikkmore com.vikkmore.app --web-dir dist
          npx cap add android

      - name: Sync Capacitor
        run: npx cap sync

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Fixed: Matches the required source release
          distribution: 'temurin'

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vikkmore-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          # We add a flag to force dependency resolution for Kotlin
          ./gradlew assembleDebug -Pandroid.useDuplicateClassNameCheck=false